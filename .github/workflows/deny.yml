name: Deny

on:
  push:
    branches: [main]
    paths: [Cargo.lock, deny.toml]
  pull_request:
    paths: [Cargo.lock, deny.toml]

permissions:
  contents: read

jobs:
  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run cargo-deny
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check all
